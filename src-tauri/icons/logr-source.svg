<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141821"/>
      <stop offset="100%" stop-color="#0d1017"/>
    </linearGradient>
    <linearGradient id="activeLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#3b6fd4" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 외곽 배경 (rounded square) -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- 터미널 프레임 -->
  <rect x="72" y="108" width="880" height="660" rx="32" fill="#1a1d27" stroke="#2e3245" stroke-width="1.5"/>

  <!-- 윈도우 컨트롤 닷 -->
  <circle cx="130" cy="158" r="16" fill="#f87171" opacity="0.75"/>
  <circle cx="178" cy="158" r="16" fill="#fbbf24" opacity="0.75"/>
  <circle cx="226" cy="158" r="16" fill="#4ade80" opacity="0.75"/>

  <!-- 헤더 구분선 -->
  <line x1="72" y1="188" x2="952" y2="188" stroke="#2e3245" stroke-width="1"/>

  <!-- 로그 라인들 (흐릿한 과거 줄들) -->
  <rect x="120" y="222" width="520" height="11" rx="5.5" fill="#252836"/>
  <rect x="120" y="252" width="380" height="11" rx="5.5" fill="#252836"/>
  <rect x="120" y="282" width="460" height="11" rx="5.5" fill="#252836"/>
  <rect x="120" y="312" width="300" height="11" rx="5.5" fill="#252836" opacity="0.85"/>
  <rect x="120" y="342" width="500" height="11" rx="5.5" fill="#252836" opacity="0.75"/>
  <rect x="120" y="372" width="350" height="11" rx="5.5" fill="#252836" opacity="0.65"/>
  <rect x="120" y="402" width="430" height="11" rx="5.5" fill="#252836" opacity="0.55"/>
  <rect x="120" y="432" width="270" height="11" rx="5.5" fill="#252836" opacity="0.45"/>
  <rect x="120" y="462" width="410" height="11" rx="5.5" fill="#252836" opacity="0.35"/>
  <rect x="120" y="492" width="320" height="11" rx="5.5" fill="#252836" opacity="0.25"/>

  <!-- 구분선 -->
  <line x1="120" y1="530" x2="904" y2="530" stroke="#2e3245" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LIVE 뱃지 -->
  <rect x="794" y="548" width="78" height="24" rx="12" fill="#4f8ef7" opacity="0.15"/>
  <circle cx="812" cy="560" r="5" fill="#4ade80"/>
  <text x="830" y="565" font-family="-apple-system, 'SF Pro Text', sans-serif" font-size="13" font-weight="600" fill="#4f8ef7" opacity="0.9">LIVE</text>

  <!-- 활성 줄 (tail — 마지막 줄, 파란 하이라이트) -->
  <rect x="120" y="548" width="640" height="24" rx="6" fill="url(#activeLine)" filter="url(#glow)" opacity="0.92"/>

  <!-- 커서 (깜빡이는 블록) -->
  <rect x="772" y="549" width="13" height="22" rx="3" fill="#4f8ef7" opacity="0.55"/>

  <!-- ">" 프롬프트 기호 (앞쪽 장식) -->
  <text x="84" y="563" font-family="monospace" font-size="22" font-weight="700" fill="#4f8ef7" opacity="0.3">›</text>

  <!-- 하단 앱 이름 영역 -->
  <text
    x="512" y="880"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', monospace"
    font-size="88"
    font-weight="800"
    fill="#e2e8f0"
    text-anchor="middle"
    letter-spacing="-2"
  >Logr</text>

  <!-- 하단 슬로건 -->
  <text
    x="512" y="940"
    font-family="-apple-system, 'SF Pro Text', sans-serif"
    font-size="22"
    fill="#4f8ef7"
    text-anchor="middle"
    opacity="0.6"
    letter-spacing="2"
  >LOG VIEWER</text>
</svg>
